server {
    listen 80;
    server_name n8n.rutacore.cl;

    # Redirección forzosa de HTTP a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name n8n.rutacore.cl;

    # ==========================================
    # Certificados SSL (Generados vía Certbot o HestiaPanel)
    # Ejemplo de rutas Certbot:
    # ssl_certificate /etc/letsencrypt/live/n8n.rutacore.cl/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/n8n.rutacore.cl/privkey.pem;
    # ==========================================

    # Recomendaciones SSL (Descomentar en producción)
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        # Proxy hacia el contenedor Docker de n8n
        proxy_pass http://127.0.0.1:5678;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Soporte para WebSockets (Crítico para la UI de n8n)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Timeouts razonables para flujos largos o webhooks de n8n
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        
        # Opcional: Aumentar el tamaño máximo del body si se reciben archivos grandes
        client_max_body_size 50M;
    }
}
